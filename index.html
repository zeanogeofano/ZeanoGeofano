<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Overview - ZeanoGeofano</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Market Overview</h1>
        <input type="text" id="search" placeholder="Search for stocks..." />
        <div class="mode-toggle">
            <button id="toggle-mode">Toggle Dark/Light Mode</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="market-summary">
                <div class="summary-card">
                    <h2>Market Cap</h2>
                    <p>$30 Trillion</p>
                </div>
                <div class="summary-card">
                    <h2>Gainers</h2>
                    <p>+12%</p>
                </div>
                <div class="summary-card">
                    <h2>Losers</h2>
                    <p>-8%</p>
                </div>
            </div>
            <div class="stock-ticker">
                <p>Stock Ticker: AAPL +1.5% | TSLA -0.5% | AMZN +2.3%</p>
            </div>
        </section>

        <section class="portfolio">
            <h2>Your Portfolio</h2>
            <div class="portfolio-overview">
                <p>Total Investment: $50,000</p>
                <p>Market Value: $60,000</p>
                <p>Change: +20%</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ZeanoGeofano</p>
    </footer>

</body>
</html>
